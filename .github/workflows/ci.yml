name: CI Pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: ['8']

    steps:
    - uses: actions/checkout@v4 
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: 'maven'
    - name: Run Build and Logic Tests with Maven
      run: mvn clean test