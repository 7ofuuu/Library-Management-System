name: CI Pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: ['17']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
    
    - name: Compile Java code
      run: |
        javac *.java
    
    - name: Display compiled files (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        ls -la *.class
    
    - name: Display compiled files (Windows)
      if: runner.os == 'Windows'
      run: |
        dir *.class
